<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side Tabs - 欢迎</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e4e4e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .card { max-width: 480px; width: 100%; padding: 48px 32px; text-align: center; }
      h1 { font-size: 24px; margin-bottom: 12px; }
      p { color: #a1a1aa; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
      .steps { text-align: left; margin-bottom: 32px; }
      .step { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #27272a; }
      .step:last-child { border-bottom: none; }
      .step-num { width: 24px; height: 24px; border-radius: 50%; background: #6366f1; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
      .step-text { font-size: 14px; line-height: 1.5; }
      .btn { display: inline-block; padding: 10px 24px; background: #6366f1; color: white; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; }
      .btn:hover { background: #818cf8; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Side Tabs 已安装</h1>
      <p>AI 驱动的智能标签管理器，让浏览器保持整洁。</p>
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">点击工具栏上的 Side Tabs 图标，打开侧边栏。</div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">前往 <strong>chrome://settings/appearance</strong>，将侧边栏设为左侧显示。</div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">在设置页配置 AI API（支持 DeepSeek / OpenAI 兼容端点），开启智能分组。</div>
        </div>
      </div>
      <a href="chrome://settings/appearance" class="btn">前往设置</a>
      <p style="margin-top: 16px; font-size: 12px; color: #71717a;">此页面仅显示一次，可随时关闭。</p>
    </div>
  </body>
</html>
